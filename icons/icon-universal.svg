<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="indigo" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="gold" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="beadShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Rods (visible on light and dark: stroke + fill) -->
  <line x1="72" y1="168" x2="440" y2="168" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <line x1="72" y1="256" x2="440" y2="256" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <line x1="72" y1="344" x2="440" y2="344" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <!-- Row 1 beads -->
  <g filter="url(#beadShadow)">
    <circle cx="136" cy="168" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="208" cy="168" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="280" cy="168" r="28" fill="url(#indigo)" stroke="#1e293b" stroke-width="2"/>
  </g>
  <!-- Row 2 beads -->
  <g filter="url(#beadShadow)">
    <circle cx="136" cy="256" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="280" cy="256" r="28" fill="url(#indigo)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="352" cy="256" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="400" cy="256" r="28" fill="url(#indigo)" stroke="#1e293b" stroke-width="2"/>
  </g>
  <!-- Row 3 beads -->
  <g filter="url(#beadShadow)">
    <circle cx="136" cy="344" r="28" fill="url(#indigo)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="208" cy="344" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="280" cy="344" r="28" fill="url(#gold)" stroke="#1e293b" stroke-width="2"/>
    <circle cx="352" cy="344" r="28" fill="url(#indigo)" stroke="#1e293b" stroke-width="2"/>
  </g>
</svg>
